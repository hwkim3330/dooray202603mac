<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0, user-scalable=no">
    <title>KETI Kiosk Dashboard</title>
    <script src="./video/video_list.js"></script>
    <style>
        :root {
            --bg-body: #000;
            --bg-panel: #141414;
            --line: #333;
            --text-main: #fff;
            --text-dim: #888;
            --accent: #0A84FF;
            --left-w: 70%;
            --right-w: 30%;
            --name-w: 70px;
            --row-h: 70px;
            --hour-count: 12;
        }

        * { margin:0; padding:0; box-sizing:border-box; outline:none; }
        body, html { width:100%; height:100%; background:var(--bg-body); color:var(--text-main); font-family:-apple-system, BlinkMacSystemFont, "Pretendard", sans-serif; overflow:hidden; user-select:none; }

        .container { display: flex; width: 100vw; height: 100vh; }

        .left-zone {
            width: var(--left-w); background: #000;
            border-right: 1px solid var(--line);
            display: flex; flex-direction: column;
        }

        .video-wrapper {
            flex: 1;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            background: #050505; overflow: hidden;
        }
        video { width: 100%; height: 100%; object-fit: contain; }

        .vid-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: #ff453a; padding: 20px 30px;
            border-radius: 10px; font-size: 16px; pointer-events: none;
            display: none; text-align: center; line-height: 1.6; border: 1px solid #333; z-index: 100;
        }

        .playlist-zone {
            height: 130px; width: 100%;
            background: #0a0a0c; border-top: 1px solid #222;
            display: flex; align-items: center; padding: 0 20px;
            overflow-x: auto; gap: 12px;
            scrollbar-width: none;
        }
        .playlist-zone::-webkit-scrollbar { display: none; }

        .pl-item {
            flex-shrink: 0; width: 200px; height: 90px;
            background: #18181a; border: 1px solid #333; border-radius: 8px;
            display: flex; flex-direction: column; justify-content: center; padding: 12px;
            cursor: pointer; transition: all 0.2s ease; position: relative;
        }
        .pl-item:hover { background: #222; border-color: #555; }
        .pl-item.active { border-color: var(--accent); background: rgba(10, 132, 255, 0.08); box-shadow: 0 0 10px rgba(10,132,255,0.2); }
        .pl-item.active::before { content: '▶ Playing'; font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 6px; display: block; }
        .pl-item.error { opacity: 0.4; border-color: #ff453a; }
        .pl-item.error::before { content: '⚠️ Error'; font-size: 11px; color: #ff453a; font-weight: 700; margin-bottom: 6px; display: block; }
        .pl-item-title { font-size: 13px; color: #ccc; white-space: normal; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }

        .right-zone { width: var(--right-w); display: flex; flex-direction: column; background: var(--bg-panel); border-left: 1px solid #000; }
        .r-head { height: 90px; padding: 0 20px; background: #1c1c1e; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
        .r-info { display: flex; flex-direction: column; gap: 4px; }
        .r-tit { font-size: 20px; font-weight: 800; color: #fff; }
        .r-date { font-size: 13px; color: var(--text-dim); }
        .r-stat-box { text-align: right; }
        .clock { font-size: 24px; font-weight: 300; font-variant-numeric: tabular-nums; }
        .stats { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
        .stats b { color: var(--accent); margin-left: 3px; margin-right: 8px; }

        .r-body { flex: 1; overflow-y: auto; padding: 15px; }
        .loc-grp { background: #18181a; border: 1px solid var(--line); border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
        .loc-h { padding: 10px 12px; background: rgba(255,255,255,0.04); border-bottom: 1px solid var(--line); font-weight: 700; font-size: 15px; color: #ddd; display: flex; justify-content: space-between; }
        .tl-hd { display: flex; height: 30px; background: #222; border-bottom: 1px solid var(--line); }
        .tl-nm-col { width: var(--name-w); border-right: 1px solid var(--line); flex-shrink: 0; }
        .tl-tr-col { flex: 1; display: flex; }
        .tm-lbl { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #666; border-right: 1px solid rgba(255,255,255,0.05); }
        .tl-row { display: flex; height: var(--row-h); border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; }
        .tl-nm { width: var(--name-w); border-right: 1px solid var(--line); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #ccc; font-weight: 600; background: #1a1a1c; text-align: center; padding: 0 2px; word-break: keep-all; z-index: 5; }
        .tl-tr { flex: 1; position: relative; background: #121212; }
        .g-lines { position: absolute; inset: 0; display: flex; pointer-events: none; z-index: 0; }
        .g-cell { flex: 1; border-right: 1px solid rgba(255,255,255,0.03); }
        .now-bar { position: absolute; top: 0; bottom: 0; width: 1px; background: #ff453a; z-index: 20; display: none; }
        .bk-bar { position: absolute; top: 10px; bottom: 10px; background: var(--accent); border-radius: 4px; font-size: 11px; color: white; font-weight: 600; display: flex; flex-direction: column; justify-content: center; padding: 0 6px; overflow: hidden; white-space: nowrap; cursor: pointer; z-index: 10; box-shadow: 1px 2px 4px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }

        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .m-box { width: 340px; background: #222; padding: 25px; border-radius: 12px; border: 1px solid #444; }
        .m-r { display: flex; margin-bottom: 12px; font-size: 14px; color: #ddd; }
        .m-l { width: 60px; color: #777; }
        .m-btn { width: 100%; padding: 10px; margin-top: 10px; background: var(--accent); border: none; color: white; border-radius: 6px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="left-zone">
        <div class="video-wrapper">
            <video id="player" playsinline autoplay muted></video>
            <div id="vidMsg" class="vid-msg"></div>
        </div>
        <div class="playlist-zone" id="playlistUI"></div>
    </div>

    <div class="right-zone">
        <div class="r-head">
            <div class="r-info">
                <div class="r-tit">KETI 회의실</div>
                <div class="r-date" id="dateStr">-</div>
            </div>
            <div class="r-stat-box">
                <div class="clock" id="clock">00:00:00</div>
                <div class="stats">GL<b id="sG">0</b> GBC<b id="sB">0</b></div>
            </div>
        </div>
        <div class="r-body">
            <div id="errMsg" style="display:none; text-align:center; color:#ff453a; padding:20px;">
                데이터 로드 실패<br><span style="font-size:12px; color:#666">토큰 혹은 네트워크 확인</span>
            </div>
            <div id="schContent">
                <div style="text-align:center; color:#555; margin-top:50px;">데이터 불러오는 중...</div>
            </div>
        </div>
    </div>
</div>

<div id="modal">
    <div class="m-box">
        <div style="font-size:18px; font-weight:700; color:#fff; margin-bottom:20px;">예약 상세</div>
        <div class="m-r"><span class="m-l">제목</span><span id="mT"></span></div>
        <div class="m-r"><span class="m-l">시간</span><span id="mD"></span></div>
        <div class="m-r"><span class="m-l">장소</span><span id="mR"></span></div>
        <div class="m-r"><span class="m-l">담당</span><span id="mU"></span></div>
        <button class="m-btn" onclick="document.getElementById('modal').style.display='none'">닫기</button>
    </div>
</div>

<script>
    /* =================================================
       VIDEO PLAYER & PLAYLIST
       ================================================= */
    const player = document.getElementById('player');
    const msg = document.getElementById('vidMsg');
    const plContainer = document.getElementById('playlistUI');
    const VIDEO_PATH = './video/';

    let playlist = (typeof videoList !== 'undefined') ? videoList : [];
    let currentIndex = 0;

    function initPlayer() {
        if (playlist.length > 0) {
            msg.style.display = 'none';
            renderPlaylistUI();
            setTimeout(() => playVideo(0), 200);
        } else {
            showVidError("video/video_list.js 에 영상 파일명을 추가하세요.<br><br>예: const videoList = [\"demo.mp4\"];");
        }
    }

    function renderPlaylistUI() {
        plContainer.innerHTML = '';
        playlist.forEach((file, index) => {
            const item = document.createElement('div');
            item.className = 'pl-item';
            item.id = 'pl-' + index;
            const displayName = file.replace('.mp4', '').replace(/_/g, ' ');
            item.innerHTML = `<div class="pl-item-title">${displayName}</div>`;
            item.onclick = () => { if(currentIndex !== index) playVideo(index); };
            plContainer.appendChild(item);
        });
    }

    function updateUI(index) {
        document.querySelectorAll('.pl-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById('pl-' + index);
        if (activeItem) {
            activeItem.classList.add('active');
            activeItem.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
    }

    function markErrorUI(index) {
        const errItem = document.getElementById('pl-' + index);
        if(errItem) errItem.classList.add('error');
    }

    function playVideo(index) {
        if (playlist.length === 0) return;
        if (index >= playlist.length) index = 0;
        currentIndex = index;
        updateUI(currentIndex);

        const filename = playlist[currentIndex];
        player.src = `${VIDEO_PATH}${filename}`;
        player.muted = true;

        const playPromise = player.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                msg.style.display = 'none';
            }).catch(e => {
                if (e.name === 'AbortError') return;
                markErrorUI(currentIndex);
                showVidError(`'${filename}' 재생 실패.<br>잠시 후 다음 영상으로 넘어갑니다.`);
                setTimeout(() => { msg.style.display = 'none'; playVideo(currentIndex + 1); }, 2500);
            });
        }
    }

    player.onended = function() { playVideo(currentIndex + 1); };
    player.onerror = function() {
        if (!player.src.endsWith(playlist[currentIndex])) return;
        markErrorUI(currentIndex);
        setTimeout(() => playVideo(currentIndex + 1), 2000);
    };

    function showVidError(text) { msg.style.display = 'block'; msg.innerHTML = text; }

    initPlayer();

    /* =================================================
       SCHEDULER (Dooray API via corsproxy.io)
       ================================================= */
    const MY_TOKEN = 's701wolho5si:sQYP0UfqQD-R6C626bOJtQ';
    const CFG = { START: 8, END: 20 };
    const KST = 'Asia/Seoul';

    class Scheduler {
        constructor() {
            this.todaySystemStr = this.getYMD(new Date());
            this.date = this.todaySystemStr;
            this.init();
            setInterval(() => this.refresh(true), 180000);
            setInterval(() => this.updateClock(), 1000);
            setInterval(() => this.updateLine(), 60000);
            setInterval(() => this.checkDateChange(), 60000);
        }

        getYMD(d) { return new Intl.DateTimeFormat('sv-SE', { timeZone: KST }).format(d); }

        checkDateChange() {
            const currentSystemStr = this.getYMD(new Date());
            if (currentSystemStr !== this.todaySystemStr) { location.reload(); }
        }

        init() {
            const d = new Date(this.date);
            document.getElementById('dateStr').textContent = `${this.date} (${d.toLocaleDateString('ko-KR',{weekday:'short'})})`;
            this.updateClock();
            this.refresh();
        }

        updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false });
        }

        async refresh(silent=false) {
            try {
                if(!silent) document.getElementById('schContent').innerHTML = '<div style="text-align:center; color:#555; margin-top:50px;">데이터 불러오는 중...</div>';

                const proxyBase = 'https://corsproxy.io/?' + encodeURIComponent('https://api.dooray.com');
                const headers = { 'Authorization': `dooray-api ${MY_TOKEN}` };

                const cRes = await fetch(`${proxyBase}/reservation/v1/resource-categories?size=20`, { headers });
                const cData = await cRes.json();

                const locs = (cData.result || [])
                    .filter(l => l.name && (l.name.includes('글로벌R&D') || l.name.includes('GBC')))
                    .sort((a,b) => a.name.includes('글로벌') ? -1 : 1);

                const container = document.getElementById('schContent');
                container.innerHTML = '';

                let gCount = 0, bCount = 0;
                const isToday = (this.date === this.getYMD(new Date()));
                const now = new Date();

                for (const loc of locs) {
                    const rRes = await fetch(`${proxyBase}/reservation/v1/reservable-resources?resourceCategoryId=${loc.id}&size=100`, { headers });
                    const rData = await rRes.json();
                    const rooms = rData.result || [];

                    let resvs = [];
                    if (rooms.length > 0) {
                        const ids = rooms.map(x => x.id).join(',');
                        const tMin = `${this.date}T00:00:00+09:00`;
                        const tMax = `${this.date}T23:59:59+09:00`;
                        const vRes = await fetch(`${proxyBase}/reservation/v1/resource-reservations?resourceIds=${ids}&timeMin=${tMin}&timeMax=${tMax}&size=500`, { headers });
                        const vData = await vRes.json();
                        resvs = vData.result || [];
                    }

                    const isG = loc.name.includes('글로벌');
                    rooms.forEach(r => {
                        if(!isToday) { isG ? gCount++ : bCount++; return; }
                        const busy = resvs.some(v => v.resource.id === r.id && now >= new Date(v.startedAt) && now <= new Date(v.endedAt));
                        if(!busy) isG ? gCount++ : bCount++;
                    });

                    this.renderLoc(container, loc, rooms, resvs, isToday);
                }

                document.getElementById('sG').textContent = gCount;
                document.getElementById('sB').textContent = bCount;
                document.getElementById('errMsg').style.display = 'none';

            } catch(e) {
                console.error(e);
                if(!silent) document.getElementById('errMsg').style.display = 'block';
            }
        }

        renderLoc(parent, loc, rooms, resvs, isToday) {
            const grp = document.createElement('div');
            grp.className = 'loc-grp';
            const name = loc.name.includes('글로벌') ? 'Global R&D Center' : 'GBC Center';

            let h = `<div class="loc-h"><span>${name}</span> <span onclick="app.refresh(true)" style="cursor:pointer">↻</span></div>`;
            h += `<div class="tl-hd"><div class="tl-nm-col"></div><div class="tl-tr-col">`;
            for(let i=CFG.START; i<CFG.END; i++) h += `<div class="tm-lbl">${i}</div>`;
            h += `</div></div><div>`;

            rooms.sort((a,b) => a.name.localeCompare(b.name)).forEach(r => {
                let rName = r.name.replace(/\d+층/,'').replace(/회의실/,'').replace(/대회의실/,'대').replace(/소회의실/,'소').replace(/중회의실/,'중').trim();
                h += `<div class="tl-row"><div class="tl-nm">${rName}</div><div class="tl-tr"><div class="g-lines">`;
                for(let i=0; i<(CFG.END-CFG.START); i++) h += `<div class="g-cell"></div>`;
                if(isToday) {
                    const pos = this.calcPos();
                    const style = (pos>=0 && pos<=100) ? `left:${pos}%; display:block;` : `display:none;`;
                    h += `<div class="now-bar" style="${style}"></div>`;
                }
                h += `</div>`;

                resvs.filter(x => x.resource.id === r.id).forEach(v => {
                    const s = new Date(v.startedAt), e = new Date(v.endedAt);
                    let off = (s.getHours() + s.getMinutes()/60) - CFG.START;
                    let dur = (e.getTime() - s.getTime()) / 3600000;
                    const tot = CFG.END - CFG.START;
                    if(off<0) { dur+=off; off=0; }
                    if(off+dur>tot) dur=tot-off;
                    if(dur>0 && off<tot) {
                        const l = (off/tot)*100, w = (dur/tot)*100;
                        const safeT = (v.subject||'').replace(/"/g,'&quot;');
                        const safeU = (v.users?.from?.member?.name||'?').replace(/"/g,'&quot;');
                        const timeS = s.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});
                        const timeE = e.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});
                        h += `<div class="bk-bar" style="left:${l}%; width:${w}%;" onclick="pop('${safeT}','${timeS}~${timeE}','${r.name}','${safeU}')">
                                <div>${v.subject}</div>
                              </div>`;
                    }
                });
                h += `</div></div>`;
            });
            h += `</div>`;
            grp.innerHTML = h;
            parent.appendChild(grp);
        }

        calcPos() {
            const now = new Date();
            const h = now.getHours() + now.getMinutes()/60;
            return ((h - CFG.START) / (CFG.END - CFG.START)) * 100;
        }

        updateLine() {
            const isToday = (this.date === this.getYMD(new Date()));
            const lines = document.querySelectorAll('.now-bar');
            const pos = this.calcPos();
            lines.forEach(l => {
                if(isToday && pos>=0 && pos<=100) { l.style.display='block'; l.style.left=`${pos}%`; }
                else { l.style.display='none'; }
            });
        }
    }

    function pop(t,d,r,u) {
        document.getElementById('mT').textContent=t; document.getElementById('mD').textContent=d;
        document.getElementById('mR').textContent=r; document.getElementById('mU').textContent=u;
        document.getElementById('modal').style.display='flex';
    }

    const app = new Scheduler();
</script>
</body>
</html>
